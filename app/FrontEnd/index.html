<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style/style.css">
</head>
<body>
    <div class="wrapper">
        <h2> Telegram web admin panel</h2>
        <div class="inputs">
            <h3 class="form-title">Отправка сообщения пользователю</h3>
            <label class="text" for="messageInput">Сообщение</label>
            <input type="text" class="wrapper_message-input" id="messageInput">

            <label class="text" for="messageChatIdInput">Chat_id/user_id</label>
            <input type="text" class="wrapper_chat-id-input" id="messageChatIdInput">
            <button class="send-btn" id="sendBtn">SEND</button>
        </div>

        
        <div class="inputs">
            <h3 class="form-title">Рассылка всем пользователям</h3>
            <label class="text" for="messageInputAll">Сообщение</label>
            <input type="text" class="wrapper_message-input" id="messageInputAll">
            <button class="send-btn" id="sendBtnAll">SEND</button>
        </div>
        
        <div class="total-users" id="totalUsersCard">
            <p> Колличество пользователей: <span id="totalUsers"></span></p>
        </div>
        
    </div>
    <script src="script/script.js"></script>
</body>
</html>
